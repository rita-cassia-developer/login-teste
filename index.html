<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando lógica de programação</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1 id="saudacao" class="saudacao"></h1>
    </header>
    <main>
        <div id="form-container" class="form-container">
            <h2>Teste de Login</h2>
            <p>Por favor, preencha o formulário abaixo para testar suas habilidades de lógica de programação.</p>
            <div class="card">
                <form id="loginForm">
                    <label for="username">Usuário:</label>
                    <input class="input" type="email" id="username" name="username" required placeholder="Digite seu nome de usuário">
                    <br>
                    <label for="password">Senha:</label>
                    <input class="input" type="password" id="password" name="password" required placeholder="Digite sua senha">
                    <br>
                    <button onclick="saudacao()" type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Teste de Lógica de Programação. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
